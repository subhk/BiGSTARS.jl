version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:10"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "julia"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:20"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"

  - package-ecosystem: "julia"
    directory: "/examples"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
