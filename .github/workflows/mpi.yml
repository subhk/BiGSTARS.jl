name: MPI/SLEPc
on:
  push:
    branches: [main]
    paths:
      - 'ext/**'
      - 'src/mpi_prep.jl'
      - 'test/mpi/**'
      - 'Project.toml'
      - '.github/workflows/mpi.yml'
  pull_request:
    paths:
      - 'ext/**'
      - 'src/mpi_prep.jl'
      - 'test/mpi/**'
      - 'Project.toml'
      - '.github/workflows/mpi.yml'
  workflow_dispatch:

env:
  PETSC_VERSION: "3.22.2"
  SLEPC_VERSION: "3.22.1"
  PETSC_ARCH: "arch-linux-c-complex"

jobs:
  mpi-slepc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build tools and OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran python3 \
            openmpi-bin libopenmpi-dev libblas-dev liblapack-dev

      - name: Cache PETSc + SLEPc
        id: cache-petsc
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/petsc
            ${{ github.workspace }}/slepc
          key: petsc-${{ env.PETSC_VERSION }}-slepc-${{ env.SLEPC_VERSION }}-${{ env.PETSC_ARCH }}

      - name: Build PETSc (complex) and SLEPc
        if: steps.cache-petsc.outputs.cache-hit != 'true'
        run: |
          export PETSC_DIR=${{ github.workspace }}/petsc
          export SLEPC_DIR=${{ github.workspace }}/slepc
          export PETSC_ARCH=${{ env.PETSC_ARCH }}
          # PETSc
          curl -L https://web.cels.anl.gov/projects/petsc/download/release-snapshots/petsc-${PETSC_VERSION}.tar.gz | tar xz
          mv petsc-${PETSC_VERSION} "$PETSC_DIR"
          cd "$PETSC_DIR"
          ./configure PETSC_ARCH=$PETSC_ARCH \
            --with-scalar-type=complex \
            --with-fortran-bindings=0 \
            --with-debugging=0 \
            --download-mumps --download-scalapack \
            --download-metis --download-parmetis
          make PETSC_DIR=$PETSC_DIR PETSC_ARCH=$PETSC_ARCH all
          # SLEPc
          cd "${{ github.workspace }}"
          curl -L https://slepc.upv.es/download/distrib/slepc-${SLEPC_VERSION}.tar.gz | tar xz
          mv slepc-${SLEPC_VERSION} "$SLEPC_DIR"
          cd "$SLEPC_DIR"
          ./configure
          make SLEPC_DIR=$SLEPC_DIR PETSC_DIR=$PETSC_DIR PETSC_ARCH=$PETSC_ARCH

      - name: Export PETSc/SLEPc env
        run: |
          echo "PETSC_DIR=${{ github.workspace }}/petsc" >> $GITHUB_ENV
          echo "SLEPC_DIR=${{ github.workspace }}/slepc" >> $GITHUB_ENV
          echo "PETSC_ARCH=${{ env.PETSC_ARCH }}" >> $GITHUB_ENV

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Configure MPI.jl (0.19 legacy build) for system OpenMPI
        env:
          JULIA_PKG_PRECOMPILE_AUTO: "0"   # don't precompile MPI before it is built
          JULIA_MPI_BINARY: system
          JULIA_MPICC: mpicc
          JULIA_MPIEXEC: mpiexec
        run: |
          # MPI.jl 0.19 (pinned transitively by SlepcWrap) predates MPIPreferences;
          # it is bound to a system MPI by Pkg.build("MPI") reading the JULIA_MPI_*
          # env vars, NOT by MPIPreferences.use_system_binary(). Install first with
          # auto-precompile off, then build so deps/deps.jl points at system OpenMPI.
          julia --project=test/mpi -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
          julia --project=test/mpi -e 'using Pkg; Pkg.build("MPI"; verbose=true)'

      - name: Precompile the MPI test environment
        run: julia --project=test/mpi -e 'using Pkg; Pkg.precompile()'

      - name: Run integration test (n=1)
        run: mpiexec -n 1 julia --project=test/mpi test/mpi/test_slepc.jl

      - name: Run integration test (n=2)
        run: mpiexec --oversubscribe -n 2 julia --project=test/mpi test/mpi/test_slepc.jl

      - name: Run integration test (n=4, groups)
        run: mpiexec --oversubscribe -n 4 julia --project=test/mpi test/mpi/test_slepc.jl

      - name: Run reuse_factorization test (n=1)
        run: mpiexec -n 1 julia --project=test/mpi test/mpi/test_slepc_reuse.jl

      - name: Run reuse_factorization test (n=2)
        run: mpiexec --oversubscribe -n 2 julia --project=test/mpi test/mpi/test_slepc_reuse.jl

      - name: Run reuse_factorization test (n=4, groups)
        run: mpiexec --oversubscribe -n 4 julia --project=test/mpi test/mpi/test_slepc_reuse.jl
