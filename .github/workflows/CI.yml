name: CI
on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.10" # LTS
          - "1.11"
          - "1.12"
        os:
          - macOS-latest
          - windows-latest
        arch:
          - x64
          - aarch64
          - arm64
        exclude:
          # Test 32-bit only on Linux
          - os: macOS-latest
            arch: x64
          - os: windows-latest
            arch: aarch64
          - os: windows-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    # Serialize gh-pages deploys: concurrent docs jobs (e.g. several pushes to
    # main in quick succession) otherwise race on `git push --force-with-lease`,
    # and the loser is rejected with "stale info". Queue them instead of
    # cancelling, so every deploy completes without colliding.
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/julia-buildpkg@latest
      - uses: julia-actions/julia-docdeploy@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          JULIA_DEBUG: Documenter

